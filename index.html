    <audio id="musica" loop preload="auto">

    <script>
        const musica = document.getElementById("musica");
        const iconeMusica = document.getElementById("img-music");

        musica.volume = 0.15;

        /* ==================================================
           CONTROLE DE ÁUDIO (Sincronização entre Abas)
        ================================================== */
        
        // Recupera o estado de mute imediatamente
        const musicaMutada = localStorage.getItem("musicMuted");
        if (musicaMutada === "true") {
            musica.muted = true;
            iconeMusica.className = "fa-solid fa-volume-xmark";
        } else {
            musica.muted = false;
            iconeMusica.className = "fa-solid fa-volume-high";
        }

        // Função para aplicar o tempo salvo e tentar reproduzir
        function sincronizarETocar() {
            const tempoSalvo = localStorage.getItem("musicTime");
            
            if (tempoSalvo && musica.currentTime === 0) {
                musica.currentTime = parseFloat(tempoSalvo);
            }

            musica.play()
                .then(() => { console.log("Áudio sincronizado com sucesso."); })
                .catch(() => { console.log("Autoplay retido. Aguardando clique."); });
        }

        // Gatilhos de execução do áudio
        musica.addEventListener("loadedmetadata", sincronizarETocar);
        window.addEventListener("DOMContentLoaded", sincronizarETocar);
        document.addEventListener("click", sincronizarETocar, { once: true });

        // Salva a minutagem atual no localStorage a cada 500ms
        setInterval(() => {
            if (!musica.paused && musica.currentTime > 0) {
                localStorage.setItem("musicTime", musica.currentTime);
            }
        }, 500);

        // Alterna o estado de mute pelo botão da Navbar
        function toggleMusic() {
            musica.muted = !musica.muted;
            iconeMusica.className = musica.muted ? "fa-solid fa-volume-xmark" : "fa-solid fa-volume-high";
            localStorage.setItem("musicMuted", musica.muted);
        }

        /* ==================================================
           SISTEMA DE COPIAR RIOT ID
        ================================================== */
        function copiarRiotID(elemento, textoParaCopiar) {
            navigator.clipboard.writeText(textoParaCopiar).then(() => {
                const parent = elemento.closest(".copy-wrapper") || elemento.parentElement;
                const existingNotif = parent.querySelector(".copy-notif");

                if (existingNotif) {
                    existingNotif.remove();
                }

                const notif = document.createElement("div");
                notif.className = "copy-notif";
                notif.innerHTML = `
                    <div class="copy-content">
                        <div class="copy-text">
                            <strong>Copiado!</strong>
                            <span>${textoParaCopiar}</span>
                        </div>
                        <i class="fa-regular fa-clipboard"></i>
                    </div>
                `;

                parent.appendChild(notif);

                setTimeout(() => {
                    notif.style.animation = "fadeOut 0.3s ease forwards";
                    setTimeout(() => { notif.remove(); }, 300);
                }, 2500);
            });
        }

        /* ==================================================
           CUSTOM CURSOR (Com Proteção de Extremidades)
        ================================================== */
        window.addEventListener("DOMContentLoaded", () => {
            const cursor = document.querySelector(".cursor");
            if (!cursor) return;

            // Movimento e detecção das bordas/scrollbar
            document.addEventListener("mousemove", (e) => {
                if (e.clientX >= window.innerWidth - 16 || e.clientY >= window.innerHeight - 5 || e.clientX <= 5 || e.clientY <= 5) {
                    cursor.style.display = "none";
                } else {
                    cursor.style.display = "block";
                }
                cursor.style.left = e.clientX + "px";
                cursor.style.top = e.clientY + "px";
            });

            // Oculta o cursor ao sair da janela
            document.addEventListener("mouseleave", () => {
                cursor.style.display = "none";
            });

            // Feedback visual em links e botões interativos
            const hoverItems = document.querySelectorAll("a, button");
            hoverItems.forEach(item => {
                item.addEventListener("mouseenter", () => cursor.classList.add("active"));
                item.addEventListener("mouseleave", () => cursor.classList.remove("active"));
            });
        });
    </script>
